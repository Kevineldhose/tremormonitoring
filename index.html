<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tremor Monitor</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    canvas {
      width: 100vw !important;
      height: 90vh !important;
    }
  </style>
</head>

<body>

<canvas id="chart"></canvas>

<script type="module">

import { initializeApp } from 
"https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import { getDatabase, ref, onValue } from 
"https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDeLq5Y7M2KukhKlSFWtFApQFCdw8QP0Dw",
  databaseURL: "https://realtime-monitroring-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

let latestWave = 0;
let labels = [];
let dataPoints = [];

const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "Tremor Wave",
      data: dataPoints,
      borderColor: "blue",
      fill: false,
      tension: 0.4,      // smooth curve
      pointRadius: 0
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    scales: {
      y: {
        min: 0,
        max: 0.5   // adjust if wave looks small
      },
      x: {
        ticks: {
          autoSkip: true,
          maxTicksLimit: 8
        }
      }
    }
  }
});

/* Firebase listener */
onValue(ref(database, 'vibration/wave'), (snapshot) => {
  const value = snapshot.val();
  if (value != null) latestWave = value;
});

/* Smooth time-based update */
setInterval(() => {

  const now = new Date();
  const timeLabel = now.toLocaleTimeString();

  labels.push(timeLabel);
  dataPoints.push(latestWave);

  if (labels.length > 150) {
    labels.shift();
    dataPoints.shift();
  }

  chart.update();

}, 50);   // smooth scrolling

</script>

</body>
</html>
