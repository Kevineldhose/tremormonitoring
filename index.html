<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibration Monitor</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    #info {
      position: absolute;
      top: 15px;
      left: 20px;
      z-index: 10;
    }

    #freq {
      font-size: 22px;
      margin-bottom: 5px;
    }

    #alert {
      font-size: 18px;
    }

    canvas {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>

<body>

<div id="info">
  <div id="freq">Vibration: 0</div>
  <div id="alert">Status: Normal</div>
</div>

<canvas id="chart"></canvas>

<script type="module">
import { initializeApp } from 
"https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import { getDatabase, ref, onValue } from 
"https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDeLq5Y7M2KukhKlSFWtFApQFCdw8QP0Dw",
  databaseURL: "https://realtime-monitroring-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

let latestValue = 0;
let labels = [];
let vibrationData = [];

const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "Frequency",
      data: vibrationData,
      borderColor: "lime",
      borderWidth: 2,
      fill: false,
      tension: 0.2
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    scales: {
      y: {
        min: 0,
        max: 15
      },
      x: {
        display: false
      }
    }
  }
});

/* Firebase Listener */
onValue(ref(database, 'vibration/frequency'), (snapshot) => {
  const value = snapshot.val();
  if (value != null) latestValue = value;
});

/* Smooth Graph Update */
setInterval(() => {

  if (latestValue < 0) latestValue = 0;

 document.getElementById("freq").innerHTML =
  "Tremor Frequency : " + latestValue.toFixed(2) + " Hz";
  if (latestValue > 2.5) {
    document.getElementById("alert").innerHTML = "🚨 TREMOR DETECTED!";
    document.getElementById("alert").style.color = "red";
  } else {
    document.getElementById("alert").innerHTML = "NORMAL";
    document.getElementById("alert").style.color = "lightgreen";
  }

  labels.push("");
  vibrationData.push(latestValue);

  if (labels.length > 100) {
    labels.shift();
    vibrationData.shift();
  }

  chart.update();

}, 100);

</script>

</body>
</html>
